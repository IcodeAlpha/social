<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialBot.ai — AI Post Generator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41; --green-dim: #00cc33;
    --green-muted: rgba(0,255,65,0.15); --green-border: rgba(0,255,65,0.3);
    --bg: #000; --bg-panel: #0a0a0a; --bg-card: #0d0d0d;
    --text: #e0e0e0; --text-dim: #666; --font: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px);
    pointer-events: none; z-index: 1000;
  }
  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }
  header {
    padding: 32px 0 24px; border-bottom: 1px solid var(--green-border);
    margin-bottom: 40px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px; border: 1px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    color: var(--green); font-size: 16px;
    animation: pulse-border 2s ease-in-out infinite;
  }
  @keyframes pulse-border { 0%,100%{box-shadow:0 0 0 0 rgba(0,255,65,0.4)} 50%{box-shadow:0 0 0 6px rgba(0,255,65,0)} }
  .logo-text { font-size: 14px; font-weight: 500; }
  .logo-text span { color: var(--green); }
  .header-status { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: blink 1.5s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .terminal-prompt {
    background: var(--bg-panel); border: 1px solid var(--green-border);
    padding: 28px 32px; margin-bottom: 32px; position: relative;
  }
  .terminal-prompt::before {
    content: '// GENERATE POST'; position: absolute; top: -1px; left: 20px;
    background: var(--bg); color: var(--green); font-size: 10px; padding: 0 8px; letter-spacing: 2px;
  }
  .prompt-line { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .prompt-symbol { color: var(--green); font-size: 16px; flex-shrink: 0; }
  .topic-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font); font-size: 15px; caret-color: var(--green);
  }
  .topic-input::placeholder { color: var(--text-dim); }
  .input-underline { height: 1px; background: var(--green-border); margin-bottom: 24px; }
  .options-row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 24px; }
  .option-group { display: flex; flex-direction: column; gap: 8px; }
  .option-label { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .checkboxes { display: flex; gap: 16px; flex-wrap: wrap; }
  .cb-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); cursor: pointer; transition: color 0.2s; }
  .cb-label:hover { color: var(--green); }
  .cb-label input[type="checkbox"] {
    appearance: none; width: 14px; height: 14px; border: 1px solid var(--text-dim);
    background: transparent; cursor: pointer; position: relative; flex-shrink: 0; transition: border-color 0.2s;
  }
  .cb-label input[type="checkbox"]:checked { border-color: var(--green); background: var(--green-muted); }
  .cb-label input[type="checkbox"]:checked::after { content: '✓'; position: absolute; top: -2px; left: 1px; color: var(--green); font-size: 11px; }
  .voice-select {
    background: transparent; border: 1px solid var(--green-border);
    color: var(--text); font-family: var(--font); font-size: 12px; padding: 6px 12px; outline: none; cursor: pointer;
  }
  .voice-select option { background: #0a0a0a; }
  .generate-btn {
    background: transparent; border: 1px solid var(--green); color: var(--green);
    font-family: var(--font); font-size: 13px; padding: 10px 28px; cursor: pointer;
    letter-spacing: 2px; text-transform: uppercase; transition: all 0.2s;
  }
  .generate-btn:hover { color: #000; background: var(--green); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .log-panel {
    background: var(--bg-panel); border: 1px solid var(--green-border);
    padding: 16px 20px; margin-bottom: 32px; display: none; position: relative;
  }
  .log-panel::before {
    content: '// LOG'; position: absolute; top: -1px; left: 20px;
    background: var(--bg); color: var(--text-dim); font-size: 10px; padding: 0 8px; letter-spacing: 2px;
  }
  .log-line { font-size: 12px; color: var(--text-dim); line-height: 1.8; }
  .log-line.success { color: var(--green); }
  .log-line.error { color: #ff4444; }
  .results { display: none; }
  .results-title { font-size: 11px; color: var(--green); letter-spacing: 3px; margin-bottom: 24px; }
  .image-section { margin-bottom: 32px; border: 1px solid var(--green-border); overflow: hidden; position: relative; }
  .image-section::before {
    content: '// GENERATED IMAGE'; position: absolute; top: -1px; left: 20px;
    background: var(--bg); color: var(--green); font-size: 10px; padding: 0 8px; letter-spacing: 2px; z-index: 1;
  }
  .generated-image { width: 100%; max-height: 420px; object-fit: cover; display: block; }
  .image-loading {
    width: 100%; height: 260px; display: flex; align-items: center;
    justify-content: center; color: var(--text-dim); font-size: 12px; gap: 12px;
  }
  .spinner {
    width: 16px; height: 16px; border: 1px solid var(--green-border);
    border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .platforms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .platform-card {
    background: var(--bg-card); border: 1px solid var(--green-border);
    padding: 24px; position: relative; transition: border-color 0.2s;
  }
  .platform-card:hover { border-color: var(--green); }
  .platform-card::before {
    content: attr(data-platform); position: absolute; top: -1px; left: 16px;
    background: var(--bg); color: var(--green); font-size: 10px; padding: 0 8px; letter-spacing: 2px; text-transform: uppercase;
  }
  .caption-text { font-size: 12px; line-height: 1.8; color: var(--text); margin-bottom: 16px; white-space: pre-wrap; word-break: break-word; }
  .hashtags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .hashtag { font-size: 10px; color: var(--green-dim); background: var(--green-muted); padding: 2px 8px; }
  .card-actions { display: flex; gap: 12px; padding-top: 16px; border-top: 1px solid var(--green-border); }
  .copy-btn {
    background: transparent; border: 1px solid var(--green-border); color: var(--text-dim);
    font-family: var(--font); font-size: 10px; padding: 6px 14px; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--green); color: var(--green); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }
  .error-box {
    background: rgba(255,68,68,0.05); border: 1px solid rgba(255,68,68,0.3);
    padding: 16px 20px; color: #ff4444; font-size: 12px; display: none; margin-bottom: 24px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <div class="logo-text"><span>social</span>bot.ai — <span>β</span></div>
    </div>
    <div class="header-status"><div class="status-dot"></div> GEMINI 2.0 + POLLINATIONS</div>
  </header>

  <div class="terminal-prompt">
    <div class="prompt-line">
      <span class="prompt-symbol">❯</span>
      <input type="text" class="topic-input" id="topicInput" placeholder="enter topic or campaign idea..." autocomplete="off" />
    </div>
    <div class="input-underline"></div>
    <div class="options-row">
      <div class="option-group">
        <div class="option-label">Platforms</div>
        <div class="checkboxes">
          <label class="cb-label"><input type="checkbox" value="instagram" checked> Instagram</label>
          <label class="cb-label"><input type="checkbox" value="twitter" checked> Twitter/X</label>
          <label class="cb-label"><input type="checkbox" value="linkedin" checked> LinkedIn</label>
        </div>
      </div>
      <div class="option-group">
        <div class="option-label">Brand Voice</div>
        <select class="voice-select" id="voiceSelect">
          <option value="professional yet approachable">Professional</option>
          <option value="bold and energetic">Bold & Energetic</option>
          <option value="educational and inspiring">Educational</option>
          <option value="casual and friendly">Casual</option>
          <option value="thought-leadership, visionary">Visionary</option>
        </select>
      </div>
    </div>
    <div class="options-row" style="margin-bottom:20px">
      <div class="option-group">
        <div class="option-label">Auto Post</div>
        <label class="cb-label">
          <input type="checkbox" id="postInstagram"> Post to Instagram after generating
        </label>
      </div>
    </div>
    <button class="generate-btn" id="generateBtn" onclick="generate()">▶ RUN GENERATOR</button>
  </div>

  <div class="log-panel" id="logPanel"><div id="logOutput"></div></div>
  <div class="error-box" id="errorBox"></div>

  <div class="results" id="results">
    <div class="results-title">// OUTPUT</div>
    <div class="image-section">
      <div class="image-loading" id="imageLoading">
        <div class="spinner"></div> generating image via pollinations.ai...
      </div>
      <img id="generatedImage" class="generated-image" style="display:none" />
    </div>
    <div class="platforms-grid" id="platformsGrid"></div>
  </div>
</div>

<script>
function log(msg, type = '') {
  const panel = document.getElementById('logPanel');
  panel.style.display = 'block';
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  line.textContent = `[${ts}] ${msg}`;
  document.getElementById('logOutput').appendChild(line);
}

function clearAll() {
  document.getElementById('logOutput').innerHTML = '';
  document.getElementById('logPanel').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('results').style.display = 'none';
}

function getSelectedPlatforms() {
  return [...document.querySelectorAll('input[type="checkbox"]:checked')].map(cb => cb.value);
}

async function generate() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) { document.getElementById('topicInput').focus(); return; }

  const platforms = getSelectedPlatforms();
  if (!platforms.length) { alert('Select at least one platform.'); return; }

  clearAll();
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⏳ GENERATING...';

  log(`topic: "${topic}"`);
  log(`platforms: ${platforms.join(', ')}`);
  log('calling api...');

  try {
    const API_BASE = window.location.hostname === 'localhost' 
  ? 'http://localhost:5000' 
  : '';

const res = await fetch(`${API_BASE}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        topic,
        platforms,
        brand_voice: document.getElementById('voiceSelect').value,
        post_to_instagram: document.getElementById('postInstagram').checked,
      }),
    });

    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Server error');

    log('captions generated', 'success');
    log('requesting image from pollinations.ai...');

    // Show Instagram post result
    if (data.instagram?.status === 'posted') {
      log(`✅ posted to instagram! media id: ${data.instagram.media_id}`, 'success');
    } else if (data.instagram?.status === 'error') {
      log(`instagram error: ${data.instagram.error}`, 'error');
    }

    renderResults(data);
    log('done.', 'success');

  } catch (err) {
    document.getElementById('errorBox').textContent = `error: ${err.message}`;
    document.getElementById('errorBox').style.display = 'block';
    log(`failed: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ RUN GENERATOR';
  }
}

function renderResults(data) {
  const results = document.getElementById('results');
  results.style.display = 'block';

  const img = document.getElementById('generatedImage');
  const imgLoading = document.getElementById('imageLoading');
  img.style.display = 'none';
  imgLoading.style.display = 'flex';
  img.onload = () => { imgLoading.style.display = 'none'; img.style.display = 'block'; log('image loaded.', 'success'); };
  img.onerror = () => { imgLoading.innerHTML = '<span style="color:#ff4444">image failed to load</span>'; };
  img.src = data.image_url;

  const grid = document.getElementById('platformsGrid');
  grid.innerHTML = '';

  for (const [platform, post] of Object.entries(data.posts)) {
    const card = document.createElement('div');
    card.className = 'platform-card';
    card.setAttribute('data-platform', `// ${platform.toUpperCase()}`);
    const tags = post.hashtags.slice(0, 10).map(t => `<span class="hashtag">${t}</span>`).join('');
    card.innerHTML = `
      <div class="caption-text">${escHtml(post.caption)}</div>
      <div class="hashtags">${tags}</div>
      <div class="card-actions">
        <button class="copy-btn" onclick="copyText(this,\`${escAttr(post.caption)}\`)">COPY CAPTION</button>
        <button class="copy-btn" onclick="copyText(this,\`${escAttr(post.hashtags.join(' '))}\`)">COPY TAGS</button>
      </div>`;
    grid.appendChild(card);
  }
  results.scrollIntoView({ behavior: 'smooth' });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/`/g,'\\`').replace(/\$/g,'\\$'); }

function copyText(btn, text) {
  navigator.clipboard.writeText(text);
  const orig = btn.textContent;
  btn.textContent = 'COPIED ✓';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('topicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });
});
</script>
</body>
</html>
